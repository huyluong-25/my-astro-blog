server {
    listen 80;
    server_name localhost;

    # Tắt sendfile để tránh lỗi trên các Kernel cũ (như bản 3.10 của bạn)
    sendfile off;
    tcp_nopush on;
    tcp_nodelay on;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Hỗ trợ URL sạch và tránh xoay vòng
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Cloudflare Functions/Workers origin.
    # Jenkins/VPS should set CF_API_ORIGIN, e.g. https://mechanical-main.pages.dev
    location /api/ {
        proxy_pass ${CF_API_ORIGIN};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Tắt chuyển hướng port để tránh lỗi "xoay xoay"
    port_in_redirect off;
}