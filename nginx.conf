server {
    listen 80;
    server_name localhost;

    # Tắt sendfile để tránh lỗi trên các Kernel cũ (như bản 3.10 của bạn)
    sendfile off;
    tcp_nopush on;
    tcp_nodelay on;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Hỗ trợ URL sạch và tránh xoay vòng
        try_files $uri $uri/ /index.html;
    }

    # Tắt chuyển hướng port để tránh lỗi "xoay xoay"
    port_in_redirect off;
}